name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # Мы добавляем --install-links, чтобы все папки внутри проекта "увидели" друг друга
        run: npm install --legacy-peer-deps --install-links

      - name: Type-check
        # Запускаем через npx turbo, чтобы он сам разрулил связи между папками
        run: npx turbo run type-check

      - name: Lint
        run: npx turbo run lint

      - name: Test
        run: npx turbo run test
  # ... остальное (job build) оставь как было
