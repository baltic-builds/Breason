name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # Мы говорим npm установить зависимости во всех воркспейсах принудительно
        run: npm install --legacy-peer-deps

      - name: Type-check
        # Запускаем через turbo, но с флагом --continue, чтобы увидеть все ошибки сразу
        run: npx turbo run type-check --continue

      - name: Lint
        run: npx turbo run lint

      - name: Test
        run: npx turbo run test
