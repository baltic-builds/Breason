name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest
    env:
      # Убираем предупреждение GitHub о Node 20
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Обновляемся до 22 (LTS), чтобы соответствовать требованиям GitHub 2026 года
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        # Добавляем установку во всем корневом проекте
        # Это гарантирует, что все пакеты в монорепозитории увидят зависимости друг друга
        run: npm install --include=dev --legacy-peer-deps

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  build:
    name: Build Breason
    runs-on: ubuntu-latest
    needs: check
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --legacy-peer-deps

      - name: Build breason
        run: npm run build:breason
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
