<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReDuck — AI Text Formatter</title>
    <link rel="icon" type="image/svg+xml" href="/duck.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Mono:wght@400;500&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { overflow: hidden; }

      /* ── Pastel Frost background ── */
      body {
        background:
          radial-gradient(ellipse 80% 60% at 15% 20%, rgba(201,255,54,0.18) 0%, transparent 60%),
          radial-gradient(ellipse 70% 70% at 85% 80%, rgba(47,199,247,0.22) 0%, transparent 55%),
          radial-gradient(ellipse 60% 50% at 50% 10%, rgba(180,210,255,0.28) 0%, transparent 65%),
          radial-gradient(ellipse 90% 60% at 5% 85%, rgba(210,190,255,0.20) 0%, transparent 60%),
          linear-gradient(135deg, #e8f4ff 0%, #f5f0ff 35%, #eafff5 65%, #fff8e8 100%);
        background-attachment: fixed;
      }

      /* ── Organic blob ── */
      body::before {
        content: '';
        position: fixed;
        width: 520px;
        height: 420px;
        top: -80px;
        right: -100px;
        background: radial-gradient(ellipse, rgba(47,199,247,0.18) 0%, rgba(201,255,54,0.10) 60%, transparent 80%);
        border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
        filter: blur(40px);
        pointer-events: none;
        z-index: 0;
        animation: blobFloat 12s ease-in-out infinite;
      }
      body::after {
        content: '';
        position: fixed;
        width: 400px;
        height: 350px;
        bottom: -60px;
        left: -80px;
        background: radial-gradient(ellipse, rgba(180,140,255,0.15) 0%, rgba(47,199,247,0.10) 60%, transparent 80%);
        border-radius: 40% 60% 30% 70% / 60% 40% 50% 50%;
        filter: blur(50px);
        pointer-events: none;
        z-index: 0;
        animation: blobFloat 15s ease-in-out infinite reverse;
      }

      @keyframes blobFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33%       { transform: translate(20px, -15px) scale(1.04); }
        66%       { transform: translate(-10px, 12px) scale(0.97); }
      }

      #root { position: relative; z-index: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
